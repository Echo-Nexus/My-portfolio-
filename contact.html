<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Form</title>
    <link rel="stylesheet" href="contact.css">
    <script src="contact.js" defer></script>
    <script type="text/javascript"
        src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js">
</script>
<script type="text/javascript">
   (function(){
      emailjs.init({
        publicKey: "MR5ZB6Bd0v13HEG2C",
      });
   })();
</script>
</head>
<body>
    <header>
        <div class="logo">
            <a href="https://vxsystem.netlify.app/">
                <img src="Cuteboy.jpg" id="Logo" alt="Logo">
            </a>
        </div>
    </header>
    <main>
        <section class="contact-section">
            <div class="contact-form">
                <h2>Get in touch with "Vx System". </h2>
                <form id="contact-form">
                    <div class="form-group">
                        <input type="text" name="from_name" placeholder="Your Name" required>
                    </div>
                    <div class="form-group">
                        <input type="email" name="email_id" placeholder="Email Address" required>
                    </div>
                    <div class="form-group">
                        <input type="tel" name="mobile_number" placeholder="Phone No." required>
                    </div>
                    <div class="form-group">
                        <textarea name="message" placeholder="Message" required></textarea>
                    </div>
                    <button type="submit">Send</button>
                </form>
            </div>
        </section>
    </main>
</body>
</html>
