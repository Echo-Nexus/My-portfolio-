<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Contact Us</title>
        <style>
            :root {
                --Tea-green: #ccd5ae;
                --Beige: #e9edc9;
                --Cornsilk: #fefae0;
                --Papaya-whip: #faedcd;
                --Buff: #d4a373;
                --Text-dark: #333;
            }

            body {
                margin: 0;
                padding: 0;
                font-family: "Segoe UI", Roboto, sans-serif;
                background: var(--Beige);
                color: var(--Text-dark);
                display: flex;
                justify-content: center;
                align-items: center;
                min-height: 100vh;
                overflow-x: hidden;
            }

            /* Fade-in animation */
            @keyframes fadeIn {
                from {
                    opacity: 0;
                    transform: translateY(-20px);
                }
                to {
                    opacity: 1;
                    transform: translateY(0);
                }
            }

            .contact-container {
                width: 100%;
                max-width: 500px;
                background: var(--Cornsilk);
                padding: 30px;
                border-radius: 16px;
                border: 2px solid var(--Buff);
                box-shadow: 0 6px 20px rgba(0, 0, 0, 0.15);
                animation: fadeIn 1s ease forwards;
            }

            h2 {
                margin: 0 0 10px;
                text-align: center;
                color: var(--Buff);
                font-size: 28px;
                font-weight: 700;
            }

            p.subtitle {
                text-align: center;
                font-size: 14px;
                color: #555;
                margin-bottom: 25px;
            }

            form input,
            form textarea {
                width: 100%;
                padding: 12px;
                margin: 10px 0;
                border: 1px solid var(--Tea-green);
                border-radius: 10px;
                background: var(--Papaya-whip);
                color: var(--Text-dark);
                font-size: 15px;
                transition:
                    border 0.3s,
                    box-shadow 0.3s,
                    transform 0.3s;
            }

            form input:focus,
            form textarea:focus {
                outline: none;
                border-color: var(--Buff);
                box-shadow: 0 0 10px rgba(212, 163, 115, 0.5);
                transform: scale(1.02);
            }

            textarea {
                resize: none;
                min-height: 120px;
                overflow-y: hidden; /* hides scrollbar until needed */
            }

            button {
                width: 100%;
                padding: 14px;
                margin-top: 10px;
                border: none;
                border-radius: 10px;
                background: var(--Buff);
                color: white;
                font-size: 16px;
                font-weight: 600;
                cursor: pointer;
                transition:
                    background 0.3s,
                    transform 0.2s,
                    box-shadow 0.3s;
            }

            button:hover {
                background: #b5804f;
                transform: translateY(-2px) scale(1.02);
                box-shadow: 0 4px 15px rgba(212, 163, 115, 0.4);
            }

            .footer {
                text-align: center;
                margin-top: 20px;
                font-size: 12px;
                color: #666;
            }

            .footer span {
                color: var(--Buff);
                font-weight: bold;
            }

            /* Popup overlay */
            #popup {
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background: rgba(0, 0, 0, 0.6);
                display: flex;
                justify-content: center;
                align-items: center;
                opacity: 0;
                visibility: hidden;
                transition: opacity 0.3s;
            }

            #popup.active {
                opacity: 1;
                visibility: visible;
            }

            #popup .popup-content {
                background: var(--Cornsilk);
                padding: 25px 30px;
                border-radius: 12px;
                text-align: center;
                box-shadow: 0 6px 20px rgba(0, 0, 0, 0.2);
                animation: fadeIn 0.5s ease forwards;
            }

            #popup .popup-content button {
                margin-top: 15px;
                padding: 10px 20px;
                background: var(--Buff);
                color: white;
                border: none;
                border-radius: 8px;
                cursor: pointer;
                transition:
                    background 0.3s,
                    transform 0.2s;
            }

            #popup .popup-content button:hover {
                background: #b5804f;
                transform: scale(1.05);
            }
        </style>
    </head>
    <body>
        <div class="contact-container">
            <h2>Contact Us</h2>
            <p class="subtitle">
                We’d love to hear from you. Fill out the form below.
            </p>

            <form id="contact-form">
                <input
                    type="text"
                    name="from_name"
                    placeholder="Your Name"
                    required
                />
                <input
                    type="text"
                    name="subject"
                    placeholder="Subject"
                    required
                />
                <input
                    type="email"
                    name="email_id"
                    placeholder="Your Email"
                    required
                />
                <input
                    type="text"
                    name="mobile_number"
                    placeholder="Mobile Number"
                    required
                />
                <textarea
                    name="message"
                    placeholder="Write your message..."
                    required
                ></textarea>
                <button type="submit">📩 Send Message</button>
            </form>

            <div class="footer">
                <p>Powered by <span>Arix</span></p>
            </div>
        </div>

        <!-- Popup -->
        <div id="popup">
            <div class="popup-content">
                <p>
                    ⚠️ Please provide authentic information in other to hire me
                    & don't forget to check E-mail.
                </p>
                <button id="close-popup">Got it!</button>
            </div>
        </div>

        <!-- EmailJS SDK -->
        <script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>
        <script>
            (function () {
                emailjs.init("1HsG_t_03O2CmWXD9"); // Your Public Key
            })();

            // Show popup on page load
            window.addEventListener("load", function () {
                document.getElementById("popup").classList.add("active");
            });

            document
                .getElementById("close-popup")
                .addEventListener("click", function () {
                    document.getElementById("popup").classList.remove("active");
                });

            // Auto-grow textarea
            const textarea = document.querySelector("textarea");
            textarea.addEventListener("input", function () {
                this.style.height = "auto"; // reset height
                this.style.height = this.scrollHeight + "px"; // grow with content
            });

            // Form submission
            document
                .getElementById("contact-form")
                .addEventListener("submit", function (event) {
                    event.preventDefault();

                    emailjs
                        .sendForm("service_avm59vk", "template_dvcsemr", this)
                        .then(
                            function () {
                                alert("✅ Message sent successfully!");
                                document.getElementById("contact-form").reset();
                                setTimeout(() => location.reload(), 100); // Auto-refresh after submission
                            },
                            function (error) {
                                alert(
                                    "❌ Failed to send: " +
                                        JSON.stringify(error)
                                );
                            }
                        );
                });
        </script>
    </body>
</html>
