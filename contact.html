<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script type="text/javascript"
        src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js">
</script>
<script type="text/javascript">
   (function(){
      emailjs.init({
        publicKey: "LpXWaXDiZagliNUuX",
      });
   })();
</script>
    <title>Contact Us</title>
    <link rel="stylesheet" href="contact.css">
</head>
<body>
    <header>
        <div class="logo">
            <!-- Replace with your logo image -->
            <a href="index.html"><img src="https://www.dropbox.com/s/aenuvvou6i0npjwau5ab9/Screenshot_20241129_183025_Chrome.jpg?raw=1" alt="Your Logo"></a>
        </div>
    </header>
    
    <main>
        <section class="contact-section">
            <div class="contact-info">
                <!-- Add a relevant image here -->
                <img src="Contact.jpeg" alt="Contact Us Image">
            </div>
            <div class="contact-form">
                <h2>Contact Me</h2>
                <form id="contact-form">
                    <label for="from_name">Name:</label>
                    <input type="text" id="from_name" name="from_name" required>
                    
                    <label for="email_id">Email:</label>
                    <input type="email" id="email_id" name="email_id" required>
                    
                    <label for="mobile_number">Mobile Number:</label>
                    <input type="text" id="mobile_number" name="mobile_number" required>
                    
                    <label for="message">Message:</label>
                    <textarea id="message" name="message" rows="4" required></textarea>
                    
                    <button type="submit">Send Message</button>
                </form>
                <div id="status"></div>
            </div>
        </section>
    </main>
    <script src="contact.js"></script>
</body>
    </html>
